{% extends 'tracker/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-card">
            <h3 class="mb-4 text-center">Add Financial Account</h3>
            <p class="text-muted text-center mb-4">
                Keep track of multiple statements (e.g., "Chase Visa", "Main Checking").
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Account Name</label>
                    <input type="text" name="name" class="form-control bg-dark text-light border-secondary" placeholder="e.g. Chase Sapphire" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Last 4 Digits (Optional)</label>
                    <input type="text" name="last_four" class="form-control bg-dark text-light border-secondary" placeholder="e.g. 1234" maxlength="4">
                </div>
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Create Account</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
