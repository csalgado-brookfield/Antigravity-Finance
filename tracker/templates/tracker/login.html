{% extends 'tracker/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center" style="margin-top: 5rem;">
    <div class="col-md-4">
        <div class="glass-card">
            <h2 class="text-center mb-4">Login</h2>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </div>
            </form>
            <div class="mt-3 text-center">
                <small class="text-muted">Personal Finance Tracking & Planning</small>
                <div class="mt-2">
                    <a href="https://github.com/csalgado-brookfield/Antigravity-Finance" target="_blank" class="text-decoration-none" style="color: var(--accent); font-size: 0.85rem;">
                        <i class="bi bi-github"></i> View on GitHub
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
