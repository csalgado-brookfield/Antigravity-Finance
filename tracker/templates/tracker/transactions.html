{% extends 'tracker/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="glass-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>All Transactions</h3>
                <a href="{% url 'upload_csv' %}" class="btn btn-primary btn-sm">Upload New</a>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for tx in transactions %}
                        <tr>
                            <td>{{ tx.date }}</td>
                            <td>{{ tx.description }}</td>
                            <td>
                                <form method="post" class="d-flex align-items-center">
                                    {% csrf_token %}
                                    <input type="hidden" name="tx_id" value="{{ tx.id }}">
                                    <select name="category_id" class="form-select form-select-sm bg-dark text-light border-secondary" onchange="this.form.submit()">
                                        <option value="">Select...</option>
                                        {% for cat in categories %}
                                        <option value="{{ cat.id }}" {% if tx.category == cat %}selected{% endif %}>{{ cat.name }}</option>
                                        {% endfor %}
                                    </select>
                                </form>
                            </td>
                            <td class="fw-bold">${{ tx.amount }}</td>
                            <td>
                                <button class="btn btn-outline-light btn-sm"><i class="bi bi-pencil"></i></button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
